worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;

    upstream api_backend {
        server api:3000;
    }

    upstream frontend_dev {
        server frontend:5173;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 25M;

        # API routes
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # Upload endpoint – stricter rate limit
        location /api/invoices/upload {
            limit_req zone=upload_limit burst=10 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
            client_max_body_size 25M;
        }

        # SSE – disable buffering
        location ~* /api/invoices/.*/status {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;
        }

        # Internal callback (not exposed publicly)
        location /internal/ {
            allow 172.0.0.0/8;
            deny all;
            proxy_pass http://api_backend;
        }

        # Frontend (dev server with HMR)
        location / {
            proxy_pass http://frontend_dev;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
