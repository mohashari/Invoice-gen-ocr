apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-worker
  namespace: invoice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ocr-worker
  template:
    metadata:
      labels:
        app: ocr-worker
    spec:
      containers:
        - name: ocr-worker
          image: registry.example.com/invoice-ocr-worker:latest
          envFrom:
            - configMapRef:
                name: invoice-config
            - secretRef:
                name: invoice-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ocr-worker-hpa
  namespace: invoice
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ocr-worker
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
